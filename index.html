<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Personalizados</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5edff}
.topbar{background:#a259ff;color:white;padding:15px;display:flex;align-items:center}
.menu-btn{font-size:25px;margin-right:15px;cursor:pointer}

.sidebar{
position:fixed;left:-250px;top:0;width:250px;height:100%;
background:#a259ff;color:white;transition:0.3s;padding-top:20px;overflow:auto
}
.sidebar a{display:block;padding:15px;color:white;text-decoration:none}
.sidebar a:hover{background:#8b3dff}
.open{left:0}

.container{padding:20px}

.card{background:white;border-radius:15px;padding:15px;margin-bottom:15px}

.tela{display:none}
.tela.ativa{display:block}

input,select,button{
padding:10px;margin:5px;border-radius:10px;border:1px solid #d6b8ff
}

button{background:#a259ff;color:white;border:none;cursor:pointer}

.resumo{display:flex;gap:10px}
.resumo div{flex:1;background:#e6d6ff;padding:10px;border-radius:10px;text-align:center}

table{width:100%;border-collapse:collapse}
th{background:#e6d6ff;padding:10px}
td{padding:10px;border-bottom:1px solid #eee}

/* CORES PAGAMENTO */
.pago{background:#d4edda}
.metade{background:#fff3cd}
.naopago{background:#f8d7da}

.alerta{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#a259ff;
color:white;
padding:10px 20px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="topbar">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<b>MC Personalizados</b>
</div>

<div id="menu" class="sidebar">
<a onclick="abrirTela('home')">🏠 Início</a>
<a onclick="abrirTela('produtos')">📦 Produtos</a>
<a onclick="abrirTela('pedidos')">💰 Pedidos</a>
<a onclick="abrirTela('grafico')">📊 Gráfico</a>

<hr>

<a onclick="filtrarMes(0)">Janeiro</a>
<a onclick="filtrarMes(1)">Fevereiro</a>
<a onclick="filtrarMes(2)">Março</a>
<a onclick="filtrarMes(3)">Abril</a>
<a onclick="filtrarMes(4)">Maio</a>
<a onclick="filtrarMes(5)">Junho</a>
<a onclick="filtrarMes(6)">Julho</a>
<a onclick="filtrarMes(7)">Agosto</a>
<a onclick="filtrarMes(8)">Setembro</a>
<a onclick="filtrarMes(9)">Outubro</a>
<a onclick="filtrarMes(10)">Novembro</a>
<a onclick="filtrarMes(11)">Dezembro</a>
</div>

<div class="container">

<div id="home" class="tela ativa">
<div class="card resumo">
<div id="total">Total</div>
<div id="recebido">Recebido</div>
<div id="pendente">Pendente</div>
</div>
</div>

<div id="pedidos" class="tela">

<div class="card">
<button onclick="imprimirTela()">🖨️ Imprimir</button>
</div>

<div class="card">
<h3>Novo Pedido</h3>

<input type="date" id="dataPedido">
<input id="cliente" placeholder="Cliente">
<input id="vendedor" placeholder="Quem vendeu">

<select id="produto"></select>
<input id="qtd" type="number" value="1">

<input id="descricao" placeholder="Descrição">
<input id="desconto" type="number" value="0">

<select id="status">
<option>Em produção</option>
<option>Pronto</option>
<option>Entregue</option>
</select>

<select id="pagamento" onchange="mostrarParcial()">
<option value="Pago">Pago</option>
<option value="Metade">Metade</option>
<option value="Não pago">Não pago</option>
</select>

<input id="valorPago" type="number" placeholder="Quanto pagou" style="display:none;">

<button onclick="adicionarPedido()">Salvar</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Status</th>
<th>Total</th>
<th>Pago</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

</div>

<script>

let pedidos=[]

function mostrarParcial(){
valorPago.style.display = pagamento.value==="Metade" ? "inline" : "none"
}

function adicionarPedido(){

let total=100 // exemplo simples

let pago = pagamento.value==="Pago" ? total : Number(valorPago.value||0)
let falta = total - pago

let novo={
data:dataPedido.value,
cliente:cliente.value,
status:document.getElementById("status").value,
total,
pago,
falta
}

pedidos.push(novo)
carregar()
}

function carregar(){
tabela.innerHTML=""

pedidos.forEach(p=>{

let classe="naopago"
if(p.pago>=p.total) classe="pago"
else if(p.pago>0) classe="metade"

tabela.innerHTML+=`
<tr class="${classe}">
<td>${p.data}</td>
<td>${p.cliente}</td>
<td>${p.status}</td>
<td>${p.total}</td>
<td>${p.pago}</td>
</tr>`
})
}

function imprimirTela(){
let conteudo=document.getElementById("tabela").innerHTML

let w=window.open()

w.document.write(`
<table border="1" style="width:100%;border-collapse:collapse">
${conteudo}
</table>
`)

w.print()
}

</script>

</body>
</html>
