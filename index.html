<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Personalizados</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5edff}
.topbar{background:#a259ff;color:white;padding:15px;display:flex;align-items:center}
.menu-btn{font-size:25px;margin-right:15px;cursor:pointer}

.sidebar{
position:fixed;left:-250px;top:0;width:250px;height:100%;
background:#a259ff;color:white;transition:0.3s;padding-top:20px;overflow:auto
}
.sidebar a{display:block;padding:15px;color:white;text-decoration:none}
.sidebar a:hover{background:#8b3dff}
.open{left:0}

.container{padding:20px}

.card{background:white;border-radius:15px;padding:15px;margin-bottom:15px}

.tela{display:none}
.tela.ativa{display:block}

input,select,button{
padding:10px;margin:5px;border-radius:10px;border:1px solid #d6b8ff
}

button{background:#a259ff;color:white;border:none;cursor:pointer}

.resumo{display:flex;gap:10px}
.resumo div{flex:1;background:#e6d6ff;padding:10px;border-radius:10px;text-align:center}

table{width:100%;border-collapse:collapse}
th{background:#e6d6ff;padding:10px}
td{padding:10px;border-bottom:1px solid #eee}

/* CORES PAGAMENTO */
.pago{background:#d4edda}
.metade{background:#fff3cd}
.naopago{background:#f8d7da}

.alerta{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#a259ff;
color:white;
padding:10px 20px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="topbar">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<b>MC Personalizados</b>
</div>

<div id="menu" class="sidebar">
<a onclick="abrirTela('home')">🏠 Início</a>
<a onclick="abrirTela('produtos')">📦 Produtos</a>
<a onclick="abrirTela('pedidos')">💰 Pedidos</a>
<a onclick="abrirTela('grafico')">📊 Gráfico</a>

<hr>

<a onclick="filtrarMes(0)">Janeiro</a>
<a onclick="filtrarMes(1)">Fevereiro</a>
<a onclick="filtrarMes(2)">Março</a>
<a onclick="filtrarMes(3)">Abril</a>
<a onclick="filtrarMes(4)">Maio</a>
<a onclick="filtrarMes(5)">Junho</a>
<a onclick="filtrarMes(6)">Julho</a>
<a onclick="filtrarMes(7)">Agosto</a>
<a onclick="filtrarMes(8)">Setembro</a>
<a onclick="filtrarMes(9)">Outubro</a>
<a onclick="filtrarMes(10)">Novembro</a>
<a onclick="filtrarMes(11)">Dezembro</a>
</div>

<div class="container">

<div id="home" class="tela ativa">
<div class="card resumo">
<div id="total">Total</div>
<div id="recebido">Recebido</div>
<div id="pendente">Pendente</div>
</div>
</div>

<div id="produtos" class="tela">
<div class="card">
<h3>Cadastrar Produto</h3>
<input id="nomeProduto" placeholder="Nome">
<input id="precoProduto" type="number" placeholder="Preço">
<button onclick="cadastrarProduto()">Salvar</button>

<h4>Produtos:</h4>
<ul id="listaProdutos"></ul>
</div>
</div>

<div id="pedidos" class="tela">

<div class="card">
<button onclick="imprimirTela()">🖨️ Imprimir</button>
<input id="busca" placeholder="Buscar..." oninput="buscarPedidos()">
</div>

<div class="card">
<h3>Novo Pedido</h3>

<input type="date" id="dataPedido">
<input id="cliente" placeholder="Cliente">
<input id="vendedor" placeholder="Vendedor">

<select id="produto"></select>
<input id="qtd" type="number" value="1">

<input id="descricao" placeholder="Descrição">
<input id="desconto" type="number" value="0">

<select id="status">
<option>Em produção</option>
<option>Pronto</option>
<option>Entregue</option>
</select>

<select id="pagamento" onchange="mostrarParcial()">
<option value="Pago">Pago</option>
<option value="Metade">Metade</option>
<option value="Não pago">Não pago</option>
</select>

<input id="valorPago" type="number" placeholder="Valor pago" style="display:none;">

<button onclick="adicionarPedido()">Salvar</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Vendedor</th>
<th>Produto</th>
<th>Status</th>
<th>Total</th>
<th>Pago</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<div id="grafico" class="tela">
<div class="card">
<canvas id="graficoVendas"></canvas>
</div>
</div>

</div>

<div id="alerta" class="alerta"></div>

<script>

let produtos=JSON.parse(localStorage.getItem("produtos"))||[]
let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[]
let grafico=null

window.onload=()=>{
atualizarProdutos()
listarProdutos()
carregar()
gerarGrafico()
}

/* MENU */
function toggleMenu(){menu.classList.toggle("open")}
function abrirTela(t){
document.querySelectorAll(".tela").forEach(e=>e.classList.remove("ativa"))
document.getElementById(t).classList.add("ativa")
menu.classList.remove("open")
}

/* PRODUTOS */
function cadastrarProduto(){
let nome=nomeProduto.value
let preco=precoProduto.value
if(!nome||!preco)return

produtos.push({nome,preco})
localStorage.setItem("produtos",JSON.stringify(produtos))
atualizarProdutos()
listarProdutos()
}

function atualizarProdutos(){
produto.innerHTML=""
produtos.forEach(p=>{
let op=document.createElement("option")
op.value=p.preco
op.text=p.nome+" - R$ "+p.preco
produto.appendChild(op)
})
}

function listarProdutos(){
listaProdutos.innerHTML=""
produtos.forEach((p,i)=>{
listaProdutos.innerHTML+=`<li>${p.nome} - R$ ${p.preco}</li>`
})
}

/* PAGAMENTO */
function mostrarParcial(){
valorPago.style.display = pagamento.value==="Metade" ? "inline" : "none"
}

/* PEDIDOS */
function adicionarPedido(){

let total=(Number(produto.value)||0)*(Number(qtd.value)||1)
total-=Number(desconto.value||0)
if(total<0) total=0

let pago = pagamento.value==="Pago" ? total : Number(valorPago.value||0)

let novo={
data:dataPedido.value,
cliente:cliente.value,
vendedor:vendedor.value,
produto:produto.options[produto.selectedIndex]?.text||"",
status:document.getElementById("status").value,
total,
pago
}

pedidos.push(novo)
localStorage.setItem("pedidos",JSON.stringify(pedidos))

carregar()
gerarGrafico()
}

/* LISTA */
function carregar(lista=pedidos){
tabela.innerHTML=""
let totalG=0, rec=0, pen=0

lista.forEach(p=>{
let classe="naopago"
if(p.pago>=p.total) classe="pago"
else if(p.pago>0) classe="metade"

tabela.innerHTML+=`
<tr class="${classe}">
<td>${p.data}</td>
<td>${p.cliente}</td>
<td>${p.vendedor}</td>
<td>${p.produto}</td>
<td>${p.status||"Em produção"}</td>
<td>${p.total}</td>
<td>${p.pago}</td>
</tr>`

totalG+=p.total
rec+=p.pago
pen+=(p.total-p.pago)
})

total.innerText="💰 "+totalG
recebido.innerText="✅ "+rec
pendente.innerText="⏳ "+pen
}

/* BUSCA */
function buscarPedidos(){
let t=busca.value.toLowerCase()
carregar(pedidos.filter(p=>
(p.cliente||"").toLowerCase().includes(t)||
(p.vendedor||"").toLowerCase().includes(t)
))
}

/* FILTRO */
function filtrarMes(m){
abrirTela('pedidos')
carregar(pedidos.filter(p=>{
if(!p.data)return false
return new Date(p.data).getMonth()===m
}))
}

/* GRÁFICO */
function gerarGrafico(){
let meses=Array(12).fill(0)
pedidos.forEach(p=>{
if(!p.data)return
meses[new Date(p.data).getMonth()]+=p.total
})

if(grafico)grafico.destroy()

grafico=new Chart(document.getElementById("graficoVendas"),{
type:'bar',
data:{labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[{label:'Vendas',data:meses}]}
})
}

/* IMPRIMIR */
function imprimirTela(){
let conteudo=document.getElementById("tabela").innerHTML
let w=window.open()
w.document.write(`<table border="1" style="width:100%;border-collapse:collapse">${conteudo}</table>`)
w.print()
}

</script>

</body>
</html>
