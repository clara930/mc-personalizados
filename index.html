<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Personalizados</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff0f7;
}

/* MENU */
.menu-btn {
    font-size: 25px;
    padding: 15px;
    cursor: pointer;
}

.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: #ff66b2;
    color: white;
    transition: 0.3s;
    padding-top: 20px;
}

.sidebar a {
    display: block;
    padding: 15px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: #ff4da6;
}

.open {
    left: 0;
}

/* CONTEÚDO */
.container {
    padding: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 15px;
}

input, select, button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: 1px solid #ffc4e1;
}

button {
    background: #ff66b2;
    color: white;
    border: none;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #ffe0f0;
    padding: 10px;
}

td {
    padding: 10px;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="menu" class="sidebar">
<a href="#">🏠 Início</a>
<a href="#">📦 Produtos</a>
<a href="#">💰 Vendas</a>
<a href="#">📊 Relatório</a>
</div>

<div class="container">

<h2>🌸 MC Personalizados</h2>

<div class="card">
<h3>Cadastro</h3>
<input id="nomeProduto" placeholder="Produto">
<input id="precoProduto" type="number" placeholder="Preço">
<button onclick="cadastrarProduto()">Salvar</button>
</div>

<div class="card">
<h3>Novo Pedido</h3>

<input id="cliente" placeholder="Cliente">
<select id="produto"></select>
<input id="qtd" type="number" value="1">

<select id="pagamento" onchange="mostrarParcial()">
<option value="Pago">Pago</option>
<option value="Metade">Metade</option>
<option value="Não pago">Não pago</option>
</select>

<input id="valorPago" type="number" placeholder="Pagou quanto" style="display:none;">
<input id="valorFalta" type="number" placeholder="Falta" readonly style="display:none;">

<button onclick="adicionarPedido()">Adicionar</button>
</div>

<div class="card">
<h3>Pedidos</h3>
<table>
<thead>
<tr>
<th>Cliente</th>
<th>Total</th>
<th>Pago</th>
<th>Falta</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<script>

let produtos = [];
let pedidos = [];

function toggleMenu(){
 document.getElementById("menu").classList.toggle("open");
}

function cadastrarProduto(){
 produtos.push({nome:nomeProduto.value,preco:precoProduto.value});
 atualizarProdutos();
}

function atualizarProdutos(){
 produto.innerHTML="";
 produtos.forEach(p=>{
 let op=document.createElement("option");
 op.value=p.preco;
 op.text=p.nome;
 produto.appendChild(op);
 });
}

function mostrarParcial(){
 if(pagamento.value==="Metade"){
  valorPago.style.display="inline";
  valorFalta.style.display="inline";
 }
}

valorPago.addEventListener("input",()=>{
 let total=produto.value*qtd.value;
 valorFalta.value=total-valorPago.value;
});

function adicionarPedido(){
 let total=produto.value*qtd.value;
 let pago=pagamento.value==="Pago"?total:Number(valorPago.value||0);
 let falta=total-pago;

 pedidos.push({cliente:cliente.value,total,pago,falta});
 carregar();
}

function carregar(){
 tabela.innerHTML="";
 pedidos.forEach(p=>{
 tabela.innerHTML+=`<tr>
 <td>${p.cliente}</td>
 <td>${p.total}</td>
 <td>${p.pago}</td>
 <td>${p.falta}</td>
 </tr>`;
 });
}

</script>

</body>
</html>
